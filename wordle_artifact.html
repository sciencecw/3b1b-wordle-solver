<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Reverse Wordle Solver</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f9f9f9;color:#333;min-height:100vh}
  .app{max-width:680px;margin:0 auto;padding:24px 16px 48px}
  h1{font-size:1.6rem;font-weight:800;letter-spacing:-0.5px;margin-bottom:4px}
  .subtitle{color:#666;font-size:.9rem;margin-bottom:24px;line-height:1.5}
  .card{background:#fff;border:1px solid #e5e5e5;border-radius:12px;padding:20px;margin-bottom:16px}
  label{display:block;font-size:.8rem;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:#555;margin-bottom:6px}
  input[type=text],textarea{width:100%;border:1.5px solid #ddd;border-radius:8px;padding:10px 12px;font-size:1rem;font-family:inherit;outline:none;transition:border-color .15s}
  input[type=text]:focus,textarea:focus{border-color:#6aaa64}
  textarea{resize:vertical;min-height:130px;font-size:1.1rem;line-height:1.6}
  .row{display:flex;gap:12px;flex-wrap:wrap}
  .row>*{flex:1;min-width:160px}
  .radio-group{display:flex;gap:8px;flex-wrap:wrap}
  .radio-group label{display:flex;align-items:center;gap:6px;cursor:pointer;font-size:.9rem;font-weight:400;text-transform:none;letter-spacing:0;padding:7px 14px;border:1.5px solid #ddd;border-radius:20px;transition:all .15s;white-space:nowrap}
  .radio-group input[type=radio]{display:none}
  .radio-group input[type=radio]:checked+span{font-weight:600}
  .radio-group label:has(input:checked){border-color:#6aaa64;background:#f0faf0;color:#3a7a3a}
  button#solveBtn{width:100%;padding:13px;background:#6aaa64;color:#fff;border:none;border-radius:10px;font-size:1rem;font-weight:700;cursor:pointer;margin-top:4px;transition:background .15s}
  button#solveBtn:hover{background:#5a9a54}
  button#solveBtn:disabled{background:#aaa;cursor:not-allowed}
  .spinner{display:none;text-align:center;padding:24px;color:#888;font-size:.95rem}
  .error{background:#fff0f0;border:1px solid #f5b5b5;border-radius:8px;padding:14px;color:#c0392b;font-size:.9rem;margin-top:16px}
  .results{margin-top:20px}
  .result-card{background:#fff;border:1px solid #e5e5e5;border-radius:12px;padding:18px;margin-bottom:14px}
  .result-header{display:flex;align-items:center;gap:10px;margin-bottom:14px}
  .result-rank{font-size:1.3rem}
  .result-title{font-weight:700;font-size:1rem}
  .result-conf{font-size:.8rem;color:#888;margin-left:auto}
  .conf-bar{height:6px;border-radius:3px;background:#6aaa64;margin-top:4px;transition:width .4s}
  .step{display:flex;align-items:center;gap:10px;padding:5px 0;border-bottom:1px solid #f2f2f2}
  .step:last-child{border-bottom:none}
  .step-num{width:20px;color:#bbb;font-size:.8rem;text-align:right;flex-shrink:0}
  .tiles{display:flex;gap:2px;flex-shrink:0}
  .tile{width:32px;height:32px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:16px}
  .step-word{font-weight:700;font-family:monospace;font-size:1rem;letter-spacing:1px;min-width:60px}
  .step-meta{font-size:.75rem;color:#888;line-height:1.4}
  .step-alts{font-size:.72rem;color:#aaa;font-style:italic}
  .examples{margin-top:16px}
  .examples h3{font-size:.8rem;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:#888;margin-bottom:8px}
  .ex-btn{display:inline-block;padding:6px 12px;border:1px solid #ddd;border-radius:16px;font-size:.8rem;cursor:pointer;background:#fff;margin:3px;transition:all .15s;color:#555}
  .ex-btn:hover{border-color:#6aaa64;color:#3a7a3a;background:#f0faf0}
  @media(max-width:480px){.step-word{min-width:48px;font-size:.9rem}.tile{width:28px;height:28px;font-size:14px}}
</style>
</head>
<body>
<div class="app">
  <h1>🟩 Reverse Wordle Solver</h1>
  <p class="subtitle">Paste your Wordle share and enter the answer — reconstructs the most likely guesses using entropy and a model of human play.</p>

  <div class="card">
    <div class="row">
      <div>
        <label for="answerIn">Answer word</label>
        <input type="text" id="answerIn" placeholder="e.g. umbra" maxlength="5" autocomplete="off" spellcheck="false">
      </div>
      <div style="flex:2">
        <label for="shareIn">Paste Wordle share</label>
        <textarea id="shareIn" placeholder="Wordle 1,784 4/6&#10;&#10;🟨🟨⬛⬛⬛&#10;🟨⬛⬛🟨🟨&#10;⬛⬛🟨🟩🟨&#10;🟩🟩🟩🟩🟩" spellcheck="false"></textarea>
      </div>
    </div>
    <div style="margin-top:14px">
      <label>Player type</label>
      <div class="radio-group">
        <label><input type="radio" name="beta" value="2"><span>😊 Casual</span></label>
        <label><input type="radio" name="beta" value="5" checked><span>🎯 Normal</span></label>
        <label><input type="radio" name="beta" value="10"><span>🧠 Expert</span></label>
      </div>
    </div>
    <button id="solveBtn" onclick="runSolve()" style="margin-top:16px">🔍 Reconstruct guesses</button>
  </div>

  <div class="examples">
    <h3>Try an example</h3>
    <span class="ex-btn" onclick="loadExample(0)">UMBRA 4/6 (⬛⬜ gray)</span>
    <span class="ex-btn" onclick="loadExample(1)">UMBRA 5/6 (⬜ gray)</span>
  </div>

  <div class="spinner" id="spinner">⏳ Solving…</div>
  <div id="output"></div>
</div>

// ── Constants ──────────────────────────────────────────────────────────────
const OPENERS = new Set(["crane","salet","raise","stare","adieu","arose","slate","crate","trace","roate","crane","audio","orate"]);
const TILE_BG  = ["#787c7e","#c9b458","#6aaa64"];
const TILE_EMO = ["⬛","🟨","🟩"];
const TILES_SET = new Set([..."⬛⬜🟨🟩"]);

// ── Pattern logic ──────────────────────────────────────────────────────────
function generatePattern(guess, answer) {
  const pat = [0,0,0,0,0];
  const usedA = [false,false,false,false,false];
  // Green pass
  for (let i=0;i<5;i++) if (guess[i]===answer[i]) { pat[i]=2; usedA[i]=true; }
  // Yellow pass
  for (let i=0;i<5;i++) {
    if (pat[i]===2) continue;
    for (let j=0;j<5;j++) {
      if (!usedA[j] && guess[i]===answer[j]) { pat[i]=1; usedA[j]=true; break; }
    }
  }
  return pat.reduce((s,v,i) => s + v*Math.pow(3,i), 0);
}

function patToList(p) {
  const r=[];
  for (let i=0;i<5;i++) { r.push(p%3); p=Math.floor(p/3); }
  return r;
}

// ── Parsing ────────────────────────────────────────────────────────────────
function parseShare(text) {
  const rows = [];
  for (const raw of text.split('\n')) {
    const chars = [...raw.trim()];
    if (chars.length===5 && chars.every(c=>TILES_SET.has(c))) {
      const vals = chars.map(c=>c==='🟩'?2:c==='🟨'?1:0);
      rows.push(vals.reduce((s,v,i)=>s+v*Math.pow(3,i),0));
    }
  }
  if (!rows.length) throw "No emoji rows found — paste the full Wordle share including the emoji grid.";
  if (rows[rows.length-1]!==242) throw "Last row must be all-green 🟩🟩🟩🟩🟩 (solver only works for games you won).";
  return rows;
}

// ── Entropy ────────────────────────────────────────────────────────────────
function getEntropies(candidates, remaining) {
  const n = remaining.length;
  return candidates.map(g => {
    const counts = new Float64Array(243);
    for (const a of remaining) counts[generatePattern(g,a)] += 1/n;
    let h=0;
    for (const p of counts) if (p>0) h -= p*Math.log2(p);
    return h;
  });
}

function logSoftmax(arr) {
  const max = Math.max(...arr);
  const exps = arr.map(x=>Math.exp(x-max));
  const sum  = exps.reduce((a,b)=>a+b,0);
  return exps.map(e=>Math.log(e/sum));
}

// ── Beam search ────────────────────────────────────────────────────────────
const BEAM_WIDTH = 40;

function beamSearch(patterns, answer, beta) {
  let beam = [{ guesses:[], remaining:[...WORDS], logProb:0, stepProbs:[], sizes:[], alts:[] }];

  for (let k=0; k<patterns.length-1; k++) {
    const pk = patterns[k];
    // Candidates: words that produce pattern pk against answer
    const allCands = WORDS.filter(w=>generatePattern(w,answer)===pk);
    if (!allCands.length) throw `No word produces pattern at step ${k+1} against "${answer}". Check the answer spelling.`;

    const newBeam = [];
    for (const state of beam) {
      if (!state.remaining.length) continue;
      const entropies = getEntropies(allCands, state.remaining);
      let scores = entropies.map((h,i) => {
        let s = beta * h;
        if (k===0 && OPENERS.has(allCands[i])) s += Math.log(5);
        return s;
      });
      const lps = logSoftmax(scores);

      // Top alternatives for display
      const sortedIdx = [...lps.keys()].sort((a,b)=>lps[b]-lps[a]);
      const stepAlts = sortedIdx.slice(0,4).map(i=>[allCands[i], Math.exp(lps[i])]);

      const nBefore = state.remaining.length;
      for (const i of sortedIdx.slice(0, BEAM_WIDTH)) {
        const g = allCands[i];
        const lp = lps[i];
        // Filter remaining: keep only answers consistent with guess g giving pattern pk
        const newRemaining = state.remaining.filter(w=>generatePattern(g,w)===pk);
        newBeam.push({
          guesses:   [...state.guesses, g],
          remaining: newRemaining,
          logProb:   state.logProb + lp,
          stepProbs: [...state.stepProbs, Math.exp(lp)],
          sizes:     [...state.sizes, [nBefore, newRemaining.length]],
          alts:      [...state.alts, stepAlts],
        });
      }
    }
    if (!newBeam.length) throw "Beam collapsed — trace may be inconsistent with the answer.";
    newBeam.sort((a,b)=>b.logProb-a.logProb);
    beam = newBeam.slice(0, BEAM_WIDTH);
  }

  // Append final deterministic answer
  return beam.map(s=>({
    ...s,
    guesses:   [...s.guesses, answer],
    stepProbs: [...s.stepProbs, 1.0],
    sizes:     [...s.sizes, [s.remaining.length, 1]],
    alts:      [...s.alts, [[answer, 1.0]]],
  }));
}

// ── Rendering ──────────────────────────────────────────────────────────────
function tilesHtml(patInt) {
  return patToList(patInt).map(v=>
    `<div class="tile" style="background:${TILE_BG[v]}">${TILE_EMO[v]}</div>`
  ).join('');
}

function renderResults(beam, patterns, answer) {
  // Normalise probabilities within returned beam
  const logPs = beam.map(s=>s.logProb);
  const maxLP = Math.max(...logPs);
  const exps  = logPs.map(lp=>Math.exp(lp-maxLP));
  const total = exps.reduce((a,b)=>a+b,0);
  const normPs = exps.map(e=>e/total);
  const maxNorm = normPs[0];

  const medals = ["🥇","🥈","🥉"];
  let html = '<div class="results">';
  for (let r=0; r<Math.min(3,beam.length); r++) {
    const s = beam[r];
    const pct = (normPs[r]*100).toFixed(0);
    const barW = (normPs[r]/maxNorm*100).toFixed(0);
    html += `<div class="result-card">
      <div class="result-header">
        <span class="result-rank">${medals[r]}</span>
        <span class="result-title">Reconstruction #${r+1}</span>
        <span class="result-conf">${pct}% relative confidence</span>
      </div>
      <div class="conf-bar" style="width:${barW}%"></div>
      <div style="margin-top:14px">`;

    for (let k=0; k<s.guesses.length; k++) {
      const g = s.guesses[k];
      const pat = patterns[k];
      const [nBefore, nAfter] = s.sizes[k];
      const prob = s.stepProbs[k];
      const alts = s.alts[k];
      const altStr = alts.slice(1,4).map(([w])=>w.toUpperCase()).filter(w=>w!==g.toUpperCase()).join(', ');
      const isFinal = pat===242;

      html += `<div class="step">
        <span class="step-num">${k+1}</span>
        <div class="tiles">${tilesHtml(pat)}</div>
        <span class="step-word">${g.toUpperCase()}</span>
        <div class="step-meta">
          ${isFinal ? '' : `<span style="color:#555">p=${(prob*100).toFixed(0)}%</span> · `}
          <span>${nBefore}→${nAfter} words</span>
          ${altStr ? `<div class="step-alts">alt: ${altStr}</div>` : ''}
        </div>
      </div>`;
    }
    html += '</div></div>';
  }
  html += '</div>';
  return html;
}

// ── Main ───────────────────────────────────────────────────────────────────
const EXAMPLES = [
  {answer:"umbra", share:"Wordle 1,784 4/6\n\n🟨🟨⬛⬛⬛\n🟨⬛⬛🟨🟨\n⬛⬛🟨🟩🟨\n🟩🟩🟩🟩🟩"},
  {answer:"umbra", share:"Wordle 1,784 5/6\n\n⬜🟨🟨⬜⬜\n🟨🟨⬜⬜⬜\n🟨🟨🟨🟨⬜\n🟨🟨🟨🟨🟩\n🟩🟩🟩🟩🟩"},
];

function loadExample(i) {
  document.getElementById('answerIn').value = EXAMPLES[i].answer;
  document.getElementById('shareIn').value  = EXAMPLES[i].share;
}

function runSolve() {
  const answer = document.getElementById('answerIn').value.trim().toLowerCase();
  const share  = document.getElementById('shareIn').value;
  const beta   = parseFloat(document.querySelector('input[name=beta]:checked').value);
  const out    = document.getElementById('output');
  const btn    = document.getElementById('solveBtn');
  const spin   = document.getElementById('spinner');

  out.innerHTML = '';
  if (!answer) { out.innerHTML='<div class="error">Please enter the answer word.</div>'; return; }
  if (answer.length!==5) { out.innerHTML='<div class="error">Answer must be exactly 5 letters.</div>'; return; }
  if (!WORDS.includes(answer)) { out.innerHTML=`<div class="error">"${answer}" is not in the Wordle answer list. Check spelling.</div>`; return; }

  btn.disabled = true;
  spin.style.display = 'block';

  // Defer to allow spinner to render
  setTimeout(() => {
    try {
      const patterns = parseShare(share);
      // Validate last pattern matches all-green for the answer
      const beam = beamSearch(patterns, answer, beta);
      out.innerHTML = renderResults(beam, patterns, answer);
    } catch(e) {
      out.innerHTML = `<div class="error">${e}</div>`;
    } finally {
      btn.disabled = false;
      spin.style.display = 'none';
    }
  }, 30);
}

// Allow Enter in answer box to trigger solve
document.getElementById('answerIn').addEventListener('keydown', e => {
  if (e.key==='Enter') runSolve();
});
