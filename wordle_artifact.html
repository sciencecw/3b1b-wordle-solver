<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Reverse Wordle Solver</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f9f9f9;color:#333;min-height:100vh}
  .app{max-width:560px;margin:0 auto;padding:24px 16px 48px}
  h1{font-size:1.6rem;font-weight:800;letter-spacing:-0.5px;margin-bottom:4px}
  .subtitle{color:#666;font-size:.9rem;margin-bottom:24px;line-height:1.5}
  .card{background:#fff;border:1px solid #e5e5e5;border-radius:12px;padding:20px;margin-bottom:16px}
  label.field-label{display:block;font-size:.8rem;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:#555;margin-bottom:8px}
  textarea{width:100%;border:1.5px solid #ddd;border-radius:8px;padding:10px 12px;font-size:1.05rem;font-family:inherit;outline:none;transition:border-color .15s;resize:vertical;min-height:140px;line-height:1.7}
  textarea:focus{border-color:#6aaa64}
  .field{margin-bottom:18px}
  .pin-row{display:flex;gap:8px;margin-bottom:2px}
  .pin-box{width:52px;height:52px;border:2px solid #ddd;border-radius:6px;text-align:center;font-size:1.5rem;font-weight:800;font-family:monospace;text-transform:uppercase;outline:none;color:#333;caret-color:transparent;transition:border-color .15s,background .15s;background:#fff}
  .pin-box:focus{border-color:#6aaa64;background:#f8fff8}
  .pin-box.filled{border-color:#aaa}
  .merge-row{display:flex;align-items:flex-start;gap:8px;margin-bottom:14px;cursor:pointer}
  .merge-row input[type=checkbox]{margin-top:2px;flex-shrink:0;accent-color:#6aaa64;width:15px;height:15px;cursor:pointer}
  .merge-row span{font-size:.83rem;color:#666;line-height:1.4;cursor:pointer}
  .btn-primary{width:100%;padding:13px;background:#6aaa64;color:#fff;border:none;border-radius:10px;font-size:1rem;font-weight:700;cursor:pointer;margin-top:4px;transition:background .15s}
  .btn-primary:hover{background:#5a9a54}
  .btn-primary:disabled{background:#aaa;cursor:not-allowed}
  .btn-secondary{padding:6px 14px;border:1.5px solid #ddd;border-radius:20px;font-size:.82rem;cursor:pointer;background:#fff;color:#555;transition:all .15s;font-family:inherit}
  .btn-secondary:hover{border-color:#6aaa64;color:#3a7a3a;background:#f0faf0}
  .spinner{display:none;text-align:center;padding:24px;color:#888;font-size:.95rem}
  .error{background:#fff0f0;border:1px solid #f5b5b5;border-radius:8px;padding:14px;color:#c0392b;font-size:.9rem;margin-top:16px}
  .results{margin-top:20px}
  .result-card{background:#fff;border:1px solid #e5e5e5;border-radius:12px;padding:18px;margin-bottom:14px}
  .result-header{display:flex;align-items:center;gap:10px;margin-bottom:14px}
  .result-rank{font-size:1.3rem}
  .result-title{font-weight:700;font-size:1rem}
  .result-conf{font-size:.8rem;color:#888;margin-left:auto}
  .conf-bar{height:5px;border-radius:3px;background:#6aaa64;margin-top:4px;transition:width .4s}
  .step{display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid #f2f2f2}
  .step:last-child{border-bottom:none}
  .step-num{width:20px;color:#bbb;font-size:.8rem;text-align:right;flex-shrink:0}
  .tiles{display:flex;gap:2px;flex-shrink:0}
  .tile{width:32px;height:32px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#fff;letter-spacing:0}
  .step-meta{font-size:.75rem;color:#888;line-height:1.5}
  .step-alts{font-size:.72rem;color:#aaa;font-style:italic}
  @media(max-width:480px){.pin-box{width:46px;height:46px;font-size:1.3rem}.tile{width:28px;height:28px;font-size:11px}}
</style>
</head>
<body>
<div class="app">
  <h1>🟩 Reverse Wordle Solver <span id="app-version" style="font-size:0.5em;font-weight:400;opacity:0.5;vertical-align:middle"></span></h1>
  <p class="subtitle">Enter the answer and paste your Wordle share — reconstructs the most likely guesses using entropy and a model of human play.</p>

  <div class="card">
    <div class="field">
      <label class="field-label" for="p0">Answer word</label>
      <div class="pin-row">
        <input class="pin-box" id="p0" autocomplete="off" spellcheck="false" inputmode="text">
        <input class="pin-box" id="p1" autocomplete="off" spellcheck="false" inputmode="text">
        <input class="pin-box" id="p2" autocomplete="off" spellcheck="false" inputmode="text">
        <input class="pin-box" id="p3" autocomplete="off" spellcheck="false" inputmode="text">
        <input class="pin-box" id="p4" autocomplete="off" spellcheck="false" inputmode="text">
      </div>
    </div>
    <div class="field">
      <label class="field-label">Paste Wordle share</label>
      <textarea id="shareIn" placeholder="Wordle 4/6&#10;&#10;⬛⬛⬛⬛⬛&#10;⬛⬛⬛⬛⬛&#10;⬛⬛⬛⬛⬛&#10;⬛⬛⬛⬛⬛" spellcheck="false"></textarea>
    </div>
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
      <button class="btn-secondary" onclick="loadRandomExample()">🎲 Random example</button>
      <button class="btn-secondary" onclick="clearInputs()">✕ Clear</button>
      <span style="font-size:.78rem;color:#bbb">try a sample game</span>
    </div>
    <label class="merge-row">
      <input type="checkbox" id="mergeCheck" onchange="onMergeChange()">
      <span>Merge paths that differ by one guess</span>
    </label>
    <button id="solveBtn" class="btn-primary" onclick="runSolve()">🔍 Reconstruct guesses</button>
  </div>

  <div class="spinner" id="spinner">⏳ Solving…</div>
  <div id="output"></div>
</div>

const APP_VERSION = "v0.4";
const OPENER_PRIOR_WEIGHT = 10.0;  // step 0 opener selection
const WORD_QUALITY_WEIGHT = 3.0;   // steps 1+ familiarity proxy
const OPENER_PRIOR_DEFAULT = -0.5; // penalty for non-answer fallback words

// ── Constants ──────────────────────────────────────────────────────────────
const TILE_BG   = ["#787c7e","#c9b458","#6aaa64"];
const TILES_SET = new Set([..."⬛⬜🟨🟩"]);
const BETA      = 5;

// ── Pattern logic ──────────────────────────────────────────────────────────
function generatePattern(guess, answer) {
  const pat = [0,0,0,0,0];
  const usedA = [false,false,false,false,false];
  for (let i=0;i<5;i++) if (guess[i]===answer[i]) { pat[i]=2; usedA[i]=true; }
  for (let i=0;i<5;i++) {
    if (pat[i]===2) continue;
    for (let j=0;j<5;j++) {
      if (!usedA[j] && guess[i]===answer[j]) { pat[i]=1; usedA[j]=true; break; }
    }
  }
  return pat.reduce((s,v,i) => s + v*Math.pow(3,i), 0);
}

function patToList(p) {
  const r=[];
  for (let i=0;i<5;i++) { r.push(p%3); p=Math.floor(p/3); }
  return r;
}

// ── Parsing ────────────────────────────────────────────────────────────────
function parseShare(text) {
  const rows = [];
  for (const raw of text.split('\n')) {
    const chars = [...raw.trim()];
    if (chars.length===5 && chars.every(c=>TILES_SET.has(c))) {
      const vals = chars.map(c=>c==='🟩'?2:c==='🟨'?1:0);
      rows.push(vals.reduce((s,v,i)=>s+v*Math.pow(3,i),0));
    }
  }
  if (!rows.length) throw "No emoji rows found — paste the full Wordle share including the emoji grid.";
  if (rows[rows.length-1]!==242) throw "Last row must be all-green 🟩🟩🟩🟩🟩 (solver only works for games you won).";
  return rows;
}

// ── Entropy ────────────────────────────────────────────────────────────────
function getEntropies(candidates, remaining) {
  const n = remaining.length;
  return candidates.map(g => {
    const counts = new Float64Array(243);
    for (const a of remaining) counts[generatePattern(g,a)] += 1/n;
    let h=0;
    for (const p of counts) if (p>0) h -= p*Math.log2(p);
    return h;
  });
}

function logSoftmax(arr) {
  const max = Math.max(...arr);
  const exps = arr.map(x=>Math.exp(x-max));
  const sum  = exps.reduce((a,b)=>a+b,0);
  return exps.map(e=>Math.log(e/sum));
}

// ── Beam search ────────────────────────────────────────────────────────────
const BEAM_WIDTH = 40;

function beamSearch(patterns, answer) {
  let beam = [{ guesses:[], remaining:[...WORDS], logProb:0, stepProbs:[], sizes:[], alts:[], nonAnswer:[] }];

  for (let k=0; k<patterns.length-1; k++) {
    const pk = patterns[k];
    const answerCands = WORDS.filter(w=>generatePattern(w,answer)===pk);
    const allCands = answerCands.length > 0
      ? answerCands
      : ALLOWED_WORDS.filter(w=>generatePattern(w,answer)===pk);
    const stepIsNonAnswer = answerCands.length === 0;
    if (!allCands.length) throw `No valid word produces that pattern at step ${k+1} against "${answer}". Check the answer spelling.`;

    const newBeam = [];
    for (const state of beam) {
      if (!state.remaining.length) continue;
      const entropies = getEntropies(allCands, state.remaining);
      const priorWeight = k === 0 ? OPENER_PRIOR_WEIGHT : WORD_QUALITY_WEIGHT;
      const scores = entropies.map((h, i) => {
        const lp = OPENER_PRIOR[allCands[i]] ?? OPENER_PRIOR_DEFAULT;
        return BETA * h + priorWeight * lp;
      });
      const lps = logSoftmax(scores);
      const sortedIdx = [...lps.keys()].sort((a,b)=>lps[b]-lps[a]);
      const stepAlts = sortedIdx.slice(0,8).map(i=>[allCands[i], Math.exp(lps[i])]);
      const nBefore = state.remaining.length;
      for (const i of sortedIdx.slice(0, BEAM_WIDTH)) {
        const g = allCands[i], lp = lps[i];
        const newRemaining = state.remaining.filter(w=>generatePattern(g,w)===pk);
        newBeam.push({
          guesses:    [...state.guesses, g],
          remaining:  newRemaining,
          logProb:    state.logProb + lp,
          stepProbs:  [...state.stepProbs, Math.exp(lp)],
          sizes:      [...state.sizes, [nBefore, newRemaining.length]],
          alts:       [...state.alts, stepAlts],
          nonAnswer:  [...state.nonAnswer, stepIsNonAnswer],
        });
      }
    }
    if (!newBeam.length) throw "Beam collapsed — trace may be inconsistent with the answer.";
    newBeam.sort((a,b)=>b.logProb-a.logProb);
    beam = newBeam.slice(0, BEAM_WIDTH);
  }

  return beam.map(s=>({
    ...s,
    guesses:    [...s.guesses, answer],
    stepProbs:  [...s.stepProbs, 1.0],
    sizes:      [...s.sizes, [s.remaining.length, 1]],
    alts:       [...s.alts, [[answer, 1.0]]],
    nonAnswer:  [...s.nonAnswer, false],
  }));
}

// ── Merge ──────────────────────────────────────────────────────────────────
// Each merged group has:
//   mergedAlts: string[][]  — per step, absorbed alternative words (NOT the base word)
//   groupLogProb: number    — log of summed probability of all constituent beam states
function mergeBeam(beam, limit=3) {
  const absorbed = new Set();
  const groups   = [];

  for (let i=0; i<beam.length && groups.length<limit; i++) {
    if (absorbed.has(i)) continue;
    const base      = beam[i];
    const altSets   = base.alts.map(stepAlts => new Set(stepAlts.map(([w])=>w)));
    const mergedAlts = base.guesses.map(()=>[]);  // per step: absorbed alts (excl. base)
    let probSum     = Math.exp(base.logProb);

    for (let j=i+1; j<beam.length; j++) {
      if (absorbed.has(j)) continue;
      const cand  = beam[j];
      const diffs = [];
      for (let k=0; k<base.guesses.length; k++) {
        if (base.guesses[k] !== cand.guesses[k]) diffs.push(k);
      }
      if (diffs.length !== 1) continue;
      const diffStep = diffs[0];
      const candWord = cand.guesses[diffStep];
      if (altSets[diffStep].has(candWord) && !mergedAlts[diffStep].includes(candWord)) {
        mergedAlts[diffStep].push(candWord);
        probSum += Math.exp(cand.logProb);
        absorbed.add(j);
      }
    }
    groups.push({ ...base, mergedAlts, groupLogProb: Math.log(probSum) });
  }
  // Re-sort so highest combined-probability group is always first
  groups.sort((a,b) => b.groupLogProb - a.groupLogProb);
  return groups;
}

// ── Rendering ──────────────────────────────────────────────────────────────
function tilesHtml(patInt, word) {
  return patToList(patInt).map((v,i)=>
    `<div class="tile" style="background:${TILE_BG[v]}">${word[i].toUpperCase()}</div>`
  ).join('');
}

// beamMaxLP and beamTotal are precomputed from the FULL beam so percentages
// reflect each group's share of all explored paths, not just the top-3.
function renderGroups(groups, patterns, beamMaxLP, beamTotal) {
  const normPs = groups.map(s => {
    const lp = s.groupLogProb != null ? s.groupLogProb : s.logProb;
    return Math.exp(lp - beamMaxLP) / beamTotal;
  });
  const maxN = normPs[0];
  const medals = ["🥇","🥈","🥉"];
  let html = '<div class="results">';

  for (let r=0; r<groups.length; r++) {
    const s      = groups[r];
    const pct    = (normPs[r]*100).toFixed(0);
    const barW   = (normPs[r]/maxN*100).toFixed(0);
    const nMerged = s.mergedAlts ? s.mergedAlts.reduce((n,a)=>n+a.length, 0) : 0;
    const mergeLabel = nMerged > 0
      ? ` <span style="font-size:.72rem;color:#999;font-weight:400">(+${nMerged} merged)</span>` : '';

    html += `<div class="result-card">
      <div class="result-header">
        <span class="result-rank">${medals[r]}</span>
        <span class="result-title">Reconstruction #${r+1}${mergeLabel}</span>
        <span class="result-conf">${pct}% relative confidence</span>
      </div>
      <div class="conf-bar" style="width:${barW}%"></div>
      <div style="margin-top:14px">`;

    for (let k=0; k<s.guesses.length; k++) {
      const g      = s.guesses[k];
      const pat    = patterns[k];
      const [nBefore,nAfter] = s.sizes[k];
      const prob   = s.stepProbs[k];
      const isFinal = pat===242;

      const absorbed = s.mergedAlts ? s.mergedAlts[k] : [];
      const altStr = absorbed.length > 0
        ? absorbed.map(w=>w.toUpperCase()).join(', ')
        : '';
      const isNonAnswer = s.nonAnswer && s.nonAnswer[k];
      const nonAnswerBadge = isNonAnswer ? `<span style="font-size:.68rem;color:#aaa;margin-left:4px;vertical-align:middle" title="valid guess, not an answer word">valid guess</span>` : '';

      html += `<div class="step">
        <span class="step-num">${k+1}</span>
        <div>
          <div style="display:flex;align-items:center;gap:4px">
            <div class="tiles">${tilesHtml(pat, g)}</div>
            ${nonAnswerBadge}
          </div>
          ${altStr && !isFinal ? `<div class="step-alts" style="margin-top:3px">alt: ${altStr}</div>` : ''}
        </div>
        <div class="step-meta">
          ${isFinal ? '' : `<span style="color:#555">p=${(prob*100).toFixed(0)}%</span> · `}
          <span>${nBefore}→${nAfter} words</span>
        </div>
      </div>`;
    }
    html += '</div></div>';
  }
  html += '</div>';
  return html;
}

document.getElementById('app-version').textContent = APP_VERSION;

// ── PIN box logic ──────────────────────────────────────────────────────────
const pinBoxes = [...document.querySelectorAll('.pin-box')];

pinBoxes.forEach((box, idx) => {
  // Select all on focus so typing replaces the existing letter
  box.addEventListener('focus', () => box.select());
  box.addEventListener('input', () => {
    const val = box.value.replace(/[^a-zA-Z]/g, '');
    box.value = val ? val.slice(-1).toUpperCase() : '';
    box.classList.toggle('filled', !!box.value);
    if (box.value && idx < 4) pinBoxes[idx+1].focus();
  });
  box.addEventListener('keydown', e => {
    if (e.key === 'Backspace') {
      e.preventDefault();
      if (box.value) {
        box.value = ''; box.classList.remove('filled');
      } else if (idx > 0) {
        pinBoxes[idx-1].value = ''; pinBoxes[idx-1].classList.remove('filled'); pinBoxes[idx-1].focus();
      }
    }
    if (e.key === 'ArrowLeft'  && idx>0) { e.preventDefault(); pinBoxes[idx-1].focus(); }
    if (e.key === 'ArrowRight' && idx<4) { e.preventDefault(); pinBoxes[idx+1].focus(); }
    if (e.key === 'Enter') runSolve();
  });
  box.addEventListener('paste', e => {
    e.preventDefault();
    const paste = (e.clipboardData||window.clipboardData).getData('text').replace(/[^a-zA-Z]/g,'');
    pinBoxes.forEach((b,i) => { b.value=i<paste.length?paste[i].toUpperCase():''; b.classList.toggle('filled',!!b.value); });
    pinBoxes[Math.min(paste.length,4)].focus();
  });
});

function getAnswer() { return pinBoxes.map(b=>b.value.toLowerCase()).join(''); }

function setAnswer(word) {
  pinBoxes.forEach((b,i) => { b.value=i<word.length?word[i].toUpperCase():''; b.classList.toggle('filled',!!b.value); });
}

// ── Examples ──────────────────────────────────────────────────────────────
const EXAMPLES = [
  { answer:"party", share:"Wordle 4/6\n\n⬛🟨🟨⬛⬛\n⬛🟨🟨⬛🟨\n🟨🟩🟩⬛🟩\n🟩🟩🟩🟩🟩" },
  { answer:"shore", share:"Wordle 3/6\n\n⬛🟨⬛⬛🟩\n🟩⬛🟩🟩🟩\n🟩🟩🟩🟩🟩" },
  { answer:"crane", share:"Wordle 2/6\n\n⬛⬛🟩🟨🟩\n🟩🟩🟩🟩🟩",   note:"lucky 2/6!" },
  { answer:"knack", share:"Wordle 4/6\n\n⬛⬛🟩⬛⬛\n⬛⬛🟩🟨⬛\n⬛🟨🟨🟩⬛\n🟩🟩🟩🟩🟩", note:"double-K trap" },
  { answer:"slump", share:"Wordle 5/6\n\n⬛⬛⬛⬛⬛\n🟩⬛⬛🟨⬛\n🟩🟨🟨⬛⬛\n🟩🟨⬛🟨⬛\n🟩🟩🟩🟩🟩", note:"all-gray opener" },
];

function loadRandomExample() {
  const ex = EXAMPLES[Math.floor(Math.random()*EXAMPLES.length)];
  setAnswer(ex.answer);
  document.getElementById('shareIn').value = ex.share;
}

function clearInputs() {
  pinBoxes.forEach(b => { b.value = ''; b.classList.remove('filled'); });
  document.getElementById('shareIn').value = '';
  document.getElementById('output').innerHTML = '';
  _beam = null; _patterns = null;
  pinBoxes[0].focus();
}

// ── State ──────────────────────────────────────────────────────────────────
let _beam=null, _patterns=null;

function onMergeChange() {
  if (!_beam) return;
  const doMerge = document.getElementById('mergeCheck').checked;
  const groups  = doMerge ? mergeBeam(_beam) : _beam.slice(0,3);
  // Normalise against the full beam so percentages don't artificially sum to 100%
  const beamMaxLP = Math.max(..._beam.map(s=>s.logProb));
  const beamTotal = _beam.reduce((sum,s) => sum + Math.exp(s.logProb - beamMaxLP), 0);
  document.getElementById('output').innerHTML = renderGroups(groups, _patterns, beamMaxLP, beamTotal);
}

// ── Main ──────────────────────────────────────────────────────────────────
function runSolve() {
  const answer = getAnswer();
  const share  = document.getElementById('shareIn').value;
  const out    = document.getElementById('output');
  const btn    = document.getElementById('solveBtn');
  const spin   = document.getElementById('spinner');

  out.innerHTML = '';
  if (answer.length!==5) { out.innerHTML='<div class="error">Please enter all 5 letters of the answer.</div>'; return; }
  if (!WORDS.includes(answer)) { out.innerHTML=`<div class="error">"${answer.toUpperCase()}" is not in the Wordle answer list. Check spelling.</div>`; return; }

  btn.disabled=true; spin.style.display='block';

  setTimeout(()=>{
    try {
      _patterns = parseShare(share);
      _beam     = beamSearch(_patterns, answer);
      onMergeChange();
    } catch(e) {
      out.innerHTML=`<div class="error">${e}</div>`;
    } finally {
      btn.disabled=false; spin.style.display='none';
    }
  }, 30);
}
</script>
